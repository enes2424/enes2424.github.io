<script>
    async function loadAllRepos() {
        const container = document.getElementById('repo-list');
        const username = 'enes2424';
        let allRepos = [];
        let page = 1;
        let keepFetching = true;

        try {
            // Döngü: GitHub boş sayfa döndürene kadar tüm sayfaları çek
            while (keepFetching) {
                const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=100&page=${page}`);
                const data = await response.json();
                
                if (data.length > 0) {
                    allRepos = [...allRepos, ...data];
                    page++;
                } else {
                    keepFetching = false;
                }
            }

            container.innerHTML = '';
            
            // Projeleri ekrana bas
            allRepos.forEach(repo => {
                // Kendi portfolyo reponu ve forkları gizle
                if (!repo.fork && repo.name !== 'enes2424.github.io') {
                    container.innerHTML += `
                        <a href="${repo.html_url}" target="_blank" class="gh-card p-6 flex flex-col justify-between h-full">
                            <div>
                                <h4 class="text-lg font-bold text-[#58a6ff] mb-2">${repo.name}</h4>
                                <p class="text-sm text-[#8b949e] line-clamp-3">${repo.description || 'Proje açıklaması GitHub üzerinden güncellenebilir.'}</p>
                            </div>
                            <div class="mt-6 flex items-center justify-between">
                                <span class="text-[10px] font-mono text-[#8b949e] uppercase">${repo.language || 'Kod'}</span>
                                <span class="text-[10px] text-gray-600">★ ${repo.stargazers_count}</span>
                            </div>
                        </a>
                    `;
                }
            });
        } catch (e) {
            container.innerHTML = "Projeler yüklenirken bir hata oluştu. Lütfen bağlantını kontrol et.";
        }
    }
    loadAllRepos();
</script>
